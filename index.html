<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissor Shoot</h1>
    <div class="game">
        <button class="bts"id="rock"></button>
        <button class="bts"id="paper"></button>
        <button class="bts"id="scissor"></button>

    <div class="scorebox">
    <div class="user">
        <p class="userscore font big"></p>

        <p class="compscore font big"></p>
        <p class="font">Computer</p>
    </div>
    </div>
    <div class="msgbox">
        <div class="msg1"></div>
        <div class="msg">Play Your Move</div>
    </div>
    <script src="app.js"></script>
